services:
  rocketchat:
    image: registry.rocket.chat/rocketchat/rocket.chat:6.6.0
    restart: unless-stopped
    environment:
      - PORT=3000
      - ROOT_URL=http://localhost:3000
      - MONGO_URL=mongodb://mongo:27017/rocketchat
      - MONGO_OPLOG_URL=mongodb://mongo:27017/local
      - OVERWRITE_SETTING_Show_Setup_Wizard=completed
      - FORKED_VOIP_ENABLED=false
    ports:
      - 3000:3000
    depends_on:
      - mongo

  mongo:
    image: mongo:5.0
    restart: unless-stopped
    command: mongod --oplogSize 128 --replSet rs0
    volumes:
      - ./data/mongo:/data/db

  mongo-init-replica:
    image: mongo:5.0
    restart: "no"
    command: >
      bash -c "for i in {1..30}; do mongosh --host mongo:27017 --eval \"rs.initiate({_id:'rs0',members:[{_id:0,host:'mongo:27017'}]})\" && break || sleep 5; done"
    depends_on:
      - mongo